<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mission Control</title>
<style>
* {box-sizing:border-box;margin:0;padding:0}
body {background:#0a0a0f;color:#fff;font:-apple-system,BlinkMacSystemFont,sans-serif;padding:0;overflow:hidden}
.app {height:100vh;display:flex;flex-direction:column}
.header {background:#1a1a1a;padding:16px;padding-top:48px;border-bottom:1px solid #333;display:flex;justify-content:space-between;align-items:center}
.header h1 {font-size:20px;background:linear-gradient(90deg,#3b82f6,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .refresh {font-size:18px;cursor:pointer;padding:8px}
.header .status {font-size:10px;color:#666;margin-right:10px}
.content {flex:1;overflow-y:auto;padding:16px;padding-bottom:80px}
.tabbar {background:#1a1a1a;display:flex;border-top:1px solid #333;padding-bottom:20px;position:fixed;bottom:0;width:100%}
.tab {flex:1;text-align:center;padding:12px 4px;cursor:pointer}
.tab-icon {font-size:18px;opacity:0.5}
.tab.active .tab-icon {opacity:1}
.tab-label {font-size:9px;color:#888;margin-top:2px}
.tab.active .tab-label {color:#3b82f6}
.screen {display:none}
.screen.active {display:block}
.stat-grid {display:flex;gap:6px;margin-bottom:16px}
.stat {flex:1;background:#1a1a1a;border-radius:10px;padding:12px;text-align:center}
.stat-num {font-size:20px;font-weight:bold;color:#3b82f6}
.stat-label {font-size:10px;color:#888;margin-top:2px}
.card {background:#1a1a1a;border-radius:10px;padding:14px;margin-bottom:10px}
.card-head {display:flex;justify-content:space-between;align-items:center}
.card-title {font-weight:600;font-size:14px}
.card-sub {font-size:11px;color:#888;margin-top:2px}
.card-meta {font-size:11px;color:#888;margin-top:6px}
.dot {width:8px;height:8px;border-radius:50%;display:inline-block}
.green {background:#10b981}
.blue {background:#3b82f6}
.gray {background:#888}
.kanban {display:flex;gap:8px;overflow-x:auto;padding-bottom:10px}
.kanban-col {width:160px;flex-shrink:0;background:#1a1a1a;border-radius:10px;padding:10px}
.kanban-title {font-size:12px;font-weight:600;margin-bottom:10px}
.task {background:#0a0a0f;border-radius:6px;padding:10px;margin-bottom:6px}
.task-title {font-size:12px}
.task-meta {font-size:10px;color:#888;margin-top:2px}
.activity {display:flex;padding:12px;border-bottom:1px solid #1a1a1a}
.activity-icon {font-size:16px;margin-right:10px}
.activity-text {font-size:12px}
.activity-time {font-size:10px;color:#888;margin-top:2px}
.chart-container {background:#1a1a1a;border-radius:10px;padding:14px;margin-bottom:14px}
.chart-title {font-size:13px;font-weight:600;margin-bottom:10px}
.toggle-row {display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #333}
.toggle-label {font-size:13px}
.toggle {width:44px;height:24px;background:#333;border-radius:12px;position:relative;cursor:pointer}
.toggle.on {background:#3b82f6}
.toggle::after {content:'';position:absolute;width:20px;height:20px;background:#fff;border-radius:50%;top:2px;left:2px;transition:0.2s}
.toggle.on::after {left:22px}
.fab {position:fixed;bottom:80px;right:16px;width:48px;height:48px;border-radius:24px;background:#3b82f6;color:#fff;font-size:22px;border:none;box-shadow:0 4px 12px rgba(59,130,246,0.4);cursor:pointer;z-index:40}
.modal {position:fixed;inset:0;background:rgba(0,0,0,0.9);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal.active {display:flex}
.modal-content {background:#1a1a1a;border-radius:14px;padding:20px;width:100%;max-width:360px}
.modal-title {font-size:16px;font-weight:600;margin-bottom:14px}
.modal input,.modal select {width:100%;background:#0a0a0f;border:none;border-radius:10px;padding:12px;color:#fff;font-size:13px;margin-bottom:10px}
.modal button {width:100%;background:#3b82f6;border:none;border-radius:10px;padding:12px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;margin-top:6px}
.modal button.secondary {background:#333;margin-top:6px}
.empty {padding:30px;text-align:center;color:#666;font-size:12px}
.weather {background:linear-gradient(135deg,#1e3a5f,#0a0a0f);border-radius:10px;padding:14px;margin-bottom:14px;display:flex;align-items:center;gap:12px}
.weather-icon {font-size:32px}
.weather-temp {font-size:24px;font-weight:bold}
.weather-desc {font-size:12px;color:#888}
</style>
</head>
<body>
<div class="app">
<div class="header">
<h1>Mission Control</h1>
<span class="status" id="status"></span>
<span class="refresh" onclick="refreshData()">🔄</span>
</div>

<div class="content">
<!-- Dashboard -->
<div class="screen active" id="screen-dashboard">
<div class="weather">
<div class="weather-icon">🌤️</div>
<div>
<div class="weather-temp" id="wtemp">12°C</div>
<div class="weather-desc" id="wdesc">Espoo</div>
</div>
</div>

<div class="stat-grid">
<div class="stat"><div class="stat-num" id="s-agents">-</div><div class="stat-label">Agents</div></div>
<div class="stat"><div class="stat-num" id="s-sessions">-</div><div class="stat-label">Sessions</div></div>
<div class="stat"><div class="stat-num" id="s-tasks">-</div><div class="stat-label">Tasks</div></div>
</div>

<div class="chart-container">
<div class="chart-title">Token Usage (7 Days)</div>
<canvas id="tokenChart" height="100"></canvas>
</div>
</div>

<!-- Agents -->
<div class="screen" id="screen-agents">
<div id="agents-list"></div>
</div>

<!-- Tasks -->
<div class="screen" id="screen-tasks">
<div class="kanban">
<div class="kanban-col"><div class="kanban-title" style="color:#888">Backlog</div><div id="tasks-backlog"></div></div>
<div class="kanban-col"><div class="kanban-title" style="color:#3b82f6">In Progress</div><div id="tasks-progress"></div></div>
<div class="kanban-col"><div class="kanban-title" style="color:#f59e0b">Review</div><div id="tasks-review"></div></div>
<div class="kanban-col"><div class="kanban-title" style="color:#10b981">Done</div><div id="tasks-done"></div></div>
</div>
</div>

<!-- Sessions -->
<div class="screen" id="screen-sessions">
<div class="chart-container">
<div class="chart-title">Session Costs</div>
<canvas id="sessionChart" height="100"></canvas>
</div>
<div id="sessions-list"></div>
</div>

<!-- Activity -->
<div class="screen" id="screen-activity">
<div id="activity-list"></div>
</div>

<!-- Settings -->
<div class="screen" id="screen-settings">
<div class="card">
<div class="card-title">Approval Queue</div>
<div id="approval-list"></div>
</div>
<div class="card">
<div class="card-title">Visibility</div>
<div class="toggle-row"><span class="toggle-label">Public Dashboard</span><div class="toggle" onclick="this.classList.toggle('on')"></div></div>
<div class="toggle-row"><span class="toggle-label">Agent Names</span><div class="toggle on" onclick="this.classList.toggle('on')"></div></div>
</div>
</div>
</div>
</div>

<button class="fab" onclick="openTaskModal()">+</button>

<div class="tabbar">
<div class="tab active" onclick="switchTab('dashboard')"><div class="tab-icon">🏠</div><div class="tab-label">Home</div></div>
<div class="tab" onclick="switchTab('agents')"><div class="tab-icon">🤖</div><div class="tab-label">Agents</div></div>
<div class="tab" onclick="switchTab('tasks')"><div class="tab-icon">📋</div><div class="tab-label">Tasks</div></div>
<div class="tab" onclick="switchTab('sessions')"><div class="tab-icon">💬</div><div class="tab-label">Sessions</div></div>
<div class="tab" onclick="switchTab('activity')"><div class="tab-icon">📡</div><div class="tab-label">Activity</div></div>
<div class="tab" onclick="switchTab('settings')"><div class="tab-icon">⚙️</div><div class="tab-label">Settings</div></div>
</div>
</div>

<div class="modal" id="task-modal">
<div class="modal-content">
<div class="modal-title">New Task</div>
<input id="task-title" placeholder="Task title">
<select id="task-status">
<option value="backlog">Backlog</option>
<option value="inProgress">In Progress</option>
<option value="review">Review</option>
</select>
<input id="task-assignee" placeholder="Assign to">
<button onclick="createTask()">Create</button>
<button class="secondary" onclick="closeTaskModal()">Cancel</button>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
const API = 'http://100.113.147.82:8094';
let tokenChart, sessionChart;

function switchTab(tab) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('screen-' + tab).classList.add('active');
  event.target.closest('.tab').classList.add('active');
}

async function refreshData() {
  const st = document.getElementById('status');
  st.textContent = 'Loading...';
  st.style.color = '#f59e0b';
  
  try {
    const [agentsRes, sessionsRes] = await Promise.all([
      fetch(API + '/api/agents').catch(e => ({json:() => []})),
      fetch(API + '/api/sessions').catch(e => ({json:() => []}))
    ]);
    
    const agents = await agentsRes.json();
    const sessions = await sessionsRes.json();
    
    document.getElementById('s-agents').textContent = agents.length || 0;
    document.getElementById('s-sessions').textContent = sessions.length || 0;
    document.getElementById('s-tasks').textContent = '3';
    
    // Agents list
    document.getElementById('agents-list').innerHTML = agents.length 
      ? agents.map(a => '<div class="card"><div class="card-head"><div><div class="card-title">' + a.name + '</div><div class="card-sub">' + (a.model || 'N/A') + '</div></div><span class="dot ' + (a.status === 'online' ? 'green' : 'gray') + '"></span></div></div>').join('') 
      : '<div class="empty">No agents</div>';
    
    // Sessions list
    document.getElementById('sessions-list').innerHTML = sessions.length 
      ? sessions.map(s => '<div class="card"><div class="card-head"><div class="card-title">' + s.model + '</div><div style="color:#10b981;font-weight:bold">$' + (s.cost || 0).toFixed(4) + '</div></div></div>').join('') 
      : '<div class="empty">No sessions</div>';
    
    // Activity
    const activities = [{icon:'🤖',text:'Data refreshed',time:'Just now'}];
    document.getElementById('activity-list').innerHTML = activities.map(a => '<div class="activity"><div class="activity-icon">' + a.icon + '</div><div><div class="activity-text">' + a.text + '</div><div class="activity-time">' + a.time + '</div></div></div>').join('');
    
    // Governance
    const approvals = [{id:1,type:'Task',name:'Deploy to prod',status:'pending'}];
    document.getElementById('approval-list').innerHTML = approvals.length 
      ? approvals.map(a => '<div class="card"><div class="card-head"><div class="card-title">' + a.name + '</div><span class="dot orange"></span></div><div class="card-meta">' + a.type + ' • ' + a.status + '</div><button style="background:#10b981;border:none;border-radius:6px;padding:8px 12px;color:#fff;margin-top:8px;cursor:pointer">Approve</button></div>').join('')
      : '<div class="empty">No pending approvals</div>';
    
    st.textContent = 'Updated';
    st.style.color = '#10b981';
    
    updateCharts();
    
  } catch(e) { 
    st.textContent = 'Error';
    st.style.color = '#ef4444';
    console.log(e); 
  }
}

function updateCharts() {
  const labels = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const data = labels.map(() => Math.floor(Math.random() * 50000) + 10000);
  if(tokenChart) tokenChart.destroy();
  tokenChart = new Chart(document.getElementById('tokenChart'),{
    type:'bar',
    data:{labels:labels,datasets:[{label:'Tokens',data:data,backgroundColor:'#3b82f6',borderRadius:4}]},
    options:{plugins:{legend:{display:false}},scales:{x:{grid:{display:false}},y:{grid:{color:'#333'}}}}
  );
}

// Tasks
const tasks = {
  backlog:[{title:'Build dashboard',assignee:'agent-1'}],
  inProgress:[{title:'Deploy',assignee:'agent-1'}],
  review:[{title:'Code review',assignee:'agent-2'}],
  done:[{title:'Setup repo',assignee:'agent-1'}]
};

function renderTasks() {
  document.getElementById('tasks-backlog').innerHTML = tasks.backlog.map(t => '<div class="task"><div class="task-title">' + t.title + '</div><div class="task-meta">' + t.assignee + '</div></div>').join('');
  document.getElementById('tasks-progress').innerHTML = tasks.inProgress.map(t => '<div class="task"><div class="task-title">' + t.title + '</div><div class="task-meta">' + t.assignee + '</div></div>').join('');
  document.getElementById('tasks-review').innerHTML = tasks.review.map(t => '<div class="task"><div class="task-title">' + t.title + '</div><div class="task-meta">' + t.assignee + '</div></div>').join('');
  document.getElementById('tasks-done').innerHTML = tasks.done.map(t => '<div class="task"><div class="task-title">' + t.title + '</div><div class="task-meta">' + t.assignee + '</div></div>').join('');
}

function openTaskModal() { document.getElementById('task-modal').classList.add('active'); }
function closeTaskModal() { document.getElementById('task-modal').classList.remove('active'); }
function createTask() {
  const title = document.getElementById('task-title').value;
  if(!title) return;
  const status = document.getElementById('task-status').value;
  const map = {backlog:'backlog',inProgress:'inProgress',review:'review'};
  if(map[status]) tasks[map[status]].push({title, assignee:document.getElementById('task-assignee').value || 'unassigned'});
  else tasks.done.push({title, assignee:'unassigned'});
  document.getElementById('task-title').value = '';
  closeTaskModal();
  renderTasks();
}

// Weather
async function refreshWeather() {
  try {
    const res = await fetch('https://wttr.in/Espoo?format=j1');
    const data = await res.json();
    const c = data.current_condition[0];
    document.getElementById('wtemp').textContent = c.temp_C + '°C';
    document.getElementById('wdesc').textContent = c.weatherDesc[0].value;
  } catch(e) { document.getElementById('wdesc').textContent = 'Offline'; }
}

// Init
renderTasks();
refreshData();
refreshWeather();
setInterval(refreshData, 5000);
</script>
</body>
</html>
